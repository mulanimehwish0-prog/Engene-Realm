kind = "web"
previewPath = "/"
title = "Engene Hub"
version = "1.0.0"
id = "artifacts/engene-hub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19369

[services.development]
run = "pnpm --filter @workspace/engene-hub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/engene-hub", "run", "build" ]
publicDir = "artifacts/engene-hub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19369"
BASE_PATH = "/"
